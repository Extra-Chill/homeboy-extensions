# Rust Language Grammar for Homeboy
#
# Defines structural patterns for Rust source files.
# Used by: audit, scaffold, drift, transform, refactor
#
# This grammar is loaded by utils/grammar.rs and consumed by all features
# that need to understand Rust source structure.

[language]
id = "rust"
extensions = ["rs"]

[comments]
line = ["//"]
block = [["/*", "*/"]]
doc = ["///", "//!"]

[strings]
quotes = ['"']
escape = "\\"
multiline = []

[blocks]
open = '{'
close = '}'

# ===========================================================================
# Patterns — each key is a concept name used by features
# ===========================================================================

[patterns.function]
# Matches: pub fn foo(), pub(crate) async fn bar(), fn baz()
regex = '^\s*(pub(?:\(crate\))?\s+)?(?:async\s+)?(?:unsafe\s+)?(?:const\s+)?fn\s+(\w+)\s*\(([^)]*)\)'
context = "any"
skip_comments = true
skip_strings = true

[patterns.function.captures]
visibility = 1
name = 2
params = 3

[patterns.struct]
# Matches: pub struct Foo, enum Bar, pub(crate) trait Baz
regex = '^\s*(pub(?:\(crate\))?\s+)?(struct|enum|trait)\s+(\w+)'
context = "top_level"
skip_comments = true
skip_strings = true

[patterns.struct.captures]
visibility = 1
kind = 2
name = 3

[patterns.import]
# Matches: use std::path::Path; use crate::error::{Error, Result};
regex = '^use\s+([\w:]+(?:::\{[^}]+\})?)\s*;'
context = "top_level"
skip_comments = true
skip_strings = true

[patterns.import.captures]
path = 1

[patterns.impl_block]
# Matches: impl Foo, impl<T> Bar, impl Trait for Baz
regex = '^\s*impl(?:<[^>]*>)?\s+(?:(\w+)\s+for\s+)?(\w+)'
context = "any"
skip_comments = true
skip_strings = true

[patterns.impl_block.captures]
trait_name = 1
type_name = 2

[patterns.macro_invocation]
# Matches: entity_crud!(Component, ...), log_status!("test", ...)
regex = '(\w+)!\s*\('
context = "any"
skip_comments = true
skip_strings = true

[patterns.macro_invocation.captures]
name = 1

[patterns.attribute]
# Matches: #[derive(Debug)], #[cfg(test)], #[test]
regex = '#\[(\w+)(?:\(([^)]*)\))?\]'
context = "any"
skip_comments = true
skip_strings = true

[patterns.attribute.captures]
name = 1
args = 2

[patterns.type_alias]
# Matches: pub type Result<T> = std::result::Result<T, Error>;
regex = '^\s*(pub(?:\(crate\))?\s+)?type\s+(\w+)'
context = "top_level"
skip_comments = true
skip_strings = true

[patterns.type_alias.captures]
visibility = 1
name = 2

[patterns.const_static]
# Matches: pub const FOO: &str = ...; pub static BAR: ...
regex = '^\s*(pub(?:\(crate\))?\s+)?(const|static)\s+(\w+)\s*:'
context = "any"
skip_comments = true
skip_strings = true

[patterns.const_static.captures]
visibility = 1
kind = 2
name = 3

[patterns.mod_declaration]
# Matches: pub mod foo; mod bar;
regex = '^\s*(pub(?:\(crate\))?\s+)?mod\s+(\w+)\s*[;{]'
context = "top_level"
skip_comments = true
skip_strings = true

[patterns.mod_declaration.captures]
visibility = 1
name = 2

[patterns.test_attribute]
# Matches: #[test] — specifically for identifying test functions
regex = '#\[test\]'
context = "any"
skip_comments = true
skip_strings = true

[patterns.cfg_test]
# Matches: #[cfg(test)] — for identifying test modules
regex = '#\[cfg\(test\)\]'
context = "any"
skip_comments = true
skip_strings = true

[patterns.derive]
# Matches: #[derive(Debug, Clone, Serialize)]
regex = '#\[derive\(([^)]+)\)\]'
context = "any"
skip_comments = true
skip_strings = true

[patterns.derive.captures]
traits = 1

[patterns.dead_code_marker]
# Matches: #[allow(dead_code)]
regex = '#\[allow\(dead_code\)\]'
context = "any"
skip_comments = true
skip_strings = true

# ===========================================================================
# Contract — patterns for function body analysis (control flow, effects, etc.)
# Used by: engine::contract_extract for test generation, doc generation, etc.
# ===========================================================================

[contract]
# Return type separator in function declarations (Rust: "->")
return_type_separator = "->"

# Side effect detection patterns. Keys are effect kinds from engine::contract::Effect.
# Each effect kind maps to a list of regex patterns matched against function body lines.
[contract.effects]
file_read = [
  'std::fs::read',
  'fs::read_to_string',
  'File::open',
  'BufReader::new',
]
file_write = [
  'std::fs::write',
  'fs::write',
  'File::create',
  'BufWriter::new',
]
file_delete = [
  'std::fs::remove_file',
  'std::fs::remove_dir',
  'fs::remove_file',
  'fs::remove_dir',
]
process_spawn = [
  'Command::new\("?([^")\s]+)',
  'std::process::Command',
]
mutation = [
  '\.push\(',
  '\.insert\(',
  '\.extend\(',
  '\.remove\(',
  '\.clear\(',
  '\.set_',
  '\.replace\(',
]
network = [
  'TcpStream::connect',
  'reqwest::',
  'hyper::',
  'ureq::',
]
logging = [
  'log_status!',
  'println!\(',
  'eprintln!\(',
  'tracing::',
  'log::',
]

# Guard clause patterns — lines with conditional early returns.
guard_patterns = [
  'if\s+.*\{\s*return\s+',
  'if\s+.*\.is_empty\(\)',
  'if\s+.*\.is_none\(\)',
  'let\s+.*=\s+match\s+.*\{\s*None\s*=>\s*return',
]

# Return variant patterns — identify which return shape variant a return statement produces.
# Keys match ReturnValue.variant in engine::contract::Branch.
[contract.return_patterns]
ok = ['Ok\((.+?)\)']
err = ['Err\((.+?)\)']
some = ['Some\((.+?)\)']
none = ['\breturn\s+None\b', '^(\s*)None\s*$']
true = ['\breturn\s+true\b']
false = ['\breturn\s+false\b']

# Error propagation patterns — lines that propagate errors to callers.
error_propagation = [
  '\?\s*;',
  '\?\s*$',
]

# Return type shape detection — matched against the function signature's return type.
# Keys match ReturnShape variants in engine::contract.
[contract.return_shapes]
result = ['Result\s*<']
option = ['Option\s*<']
bool = ['^\s*bool\s*$']
collection = ['Vec\s*<', 'HashMap\s*<', 'HashSet\s*<', 'BTreeMap\s*<']

# Panic path patterns — lines that may panic/abort.
panic_patterns = [
  'panic!\s*\((.+?)\)',
  'unreachable!\s*\(',
  'todo!\s*\(',
  '\.unwrap\(\)',
  '\.expect\(',
  'unimplemented!\s*\(',
]

# ===========================================================================
# Type defaults — zero/default value expressions for test input construction.
# Each entry has: pattern (regex matched against param type), value (code expr),
# and optional imports (extra `use` statements needed by the value).
# Patterns are tried in order; first match wins.
# ===========================================================================

[[contract.type_defaults]]
pattern = '^&str$'
value = '""'
imports = []

[[contract.type_defaults]]
pattern = '^&\[u8\]$'
value = 'Vec::<u8>::new()'
imports = []

[[contract.type_defaults]]
pattern = '^&\[.*\]$'
value = 'Vec::new()'
imports = []

[[contract.type_defaults]]
pattern = '^&Path$'
value = 'Path::new("")'
imports = ['use std::path::Path;']

[[contract.type_defaults]]
pattern = '^&PathBuf$'
value = 'PathBuf::new()'
imports = ['use std::path::PathBuf;']

[[contract.type_defaults]]
pattern = '^PathBuf$'
value = 'PathBuf::new()'
imports = ['use std::path::PathBuf;']

[[contract.type_defaults]]
pattern = '^String$'
value = 'String::new()'
imports = []

[[contract.type_defaults]]
pattern = '^&String$'
value = 'String::new()'
imports = []

[[contract.type_defaults]]
pattern = '^bool$'
value = 'false'
imports = []

[[contract.type_defaults]]
pattern = '^usize$|^u8$|^u16$|^u32$|^u64$|^u128$'
value = '0'
imports = []

[[contract.type_defaults]]
pattern = '^isize$|^i8$|^i16$|^i32$|^i64$|^i128$'
value = '0'
imports = []

[[contract.type_defaults]]
pattern = '^f32$|^f64$'
value = '0.0'
imports = []

[[contract.type_defaults]]
pattern = '^char$'
value = "'a'"
imports = []

[[contract.type_defaults]]
pattern = '^Vec<.*>$'
value = 'Vec::new()'
imports = []

[[contract.type_defaults]]
pattern = '^HashMap<.*>$'
value = 'HashMap::new()'
imports = ['use std::collections::HashMap;']

[[contract.type_defaults]]
pattern = '^HashSet<.*>$'
value = 'HashSet::new()'
imports = ['use std::collections::HashSet;']

[[contract.type_defaults]]
pattern = '^Option<.*>$'
value = 'None'
imports = []

# ===========================================================================
# Type constructors — behavioral value expressions for condition-driven setup.
# Core produces semantic hints (e.g., "empty", "nonexistent_path"); this section
# maps (hint, type_pattern) → language-specific code expression.
# ===========================================================================

fallback_default = 'Default::default()'

# Struct field extraction — enables field-level assertions in generated tests.
# field_pattern: regex with two captures: (1) field name, (2) field type
# field_visibility_pattern: regex that matches public field declarations
field_pattern = '^\s*(?:pub(?:\(crate\))?\s+)?(\w+)\s*:\s*(.+?),?\s*$'
field_visibility_pattern = '^\s*pub\b'
field_assertion_template = '{indent}assert_eq!(inner.{field_name}, {expected_value});'

# ── empty: produce a value where .is_empty() == true ──
[[contract.type_constructors]]
hint = 'empty'
pattern = '^&?\[.*\]$|^Vec<.*>$'
value = 'Vec::new()'
imports = []

[[contract.type_constructors]]
hint = 'empty'
pattern = '^&str$|^String$|^&String$'
value = '""'
imports = []

[[contract.type_constructors]]
hint = 'empty'
pattern = '^HashMap<.*>$'
value = 'HashMap::new()'
imports = ['use std::collections::HashMap;']

[[contract.type_constructors]]
hint = 'empty'
pattern = '^HashSet<.*>$'
value = 'HashSet::new()'
imports = ['use std::collections::HashSet;']

# ── non_empty: produce a value where .is_empty() == false ──
[[contract.type_constructors]]
hint = 'non_empty'
pattern = '^&?\[.*\]$|^Vec<.*>$'
value = 'vec![Default::default()]'
imports = []

[[contract.type_constructors]]
hint = 'non_empty'
pattern = '^&str$|^String$|^&String$'
value = '"test_{param_name}"'
imports = []

# ── none / some_default: Option variants ──
[[contract.type_constructors]]
hint = 'none'
pattern = '^Option<.*>$'
value = 'None'
imports = []

[[contract.type_constructors]]
hint = 'some_default'
pattern = '^Option<.*>$'
value = 'Some(Default::default())'
imports = []

# ── path existence ──
[[contract.type_constructors]]
hint = 'nonexistent_path'
pattern = '(?i)path'
value = 'Path::new("/tmp/nonexistent_test_path")'
imports = ['use std::path::Path;']

[[contract.type_constructors]]
hint = 'existent_path'
pattern = '(?i)path'
value = 'tempfile::tempdir().unwrap()'
call_arg = '{param_name}.path()'
imports = []

# ── boolean values ──
[[contract.type_constructors]]
hint = 'true'
pattern = '^bool$'
value = 'true'
imports = []

[[contract.type_constructors]]
hint = 'false'
pattern = '^bool$'
value = 'false'
imports = []

# ── numeric values ──
[[contract.type_constructors]]
hint = 'zero'
pattern = '^u\w+$|^i\w+$|^f\w+$'
value = '0'
imports = []

[[contract.type_constructors]]
hint = 'positive'
pattern = '^u\w+$|^i\w+$|^f\w+$'
value = '1'
imports = []

# ── string content (contains/starts_with) ──
[[contract.type_constructors]]
hint = 'contains'
pattern = '^&str$|^String$|^&String$'
value = '"{hint_arg}"'
imports = []

# ===========================================================================
# Assertion templates — language-specific assertion code for behavioral tests.
# Core selects an assertion key; this section provides the code template.
# Variables: {condition}, {expected_value}, {variant}
# ===========================================================================

[contract.assertion_templates]
result_ok = '        assert!(result.is_ok(), "expected Ok for: {condition}");'
result_ok_value = """        let inner = result.unwrap();
        // Branch returns Ok({expected_value}) when: {condition}
        let _ = inner; // TODO: assert specific value for "{expected_value}\""""
result_err = '        assert!(result.is_err(), "expected Err for: {condition}");'
result_err_value = """        let err = result.unwrap_err();
        // Branch returns Err({expected_value}) when: {condition}
        let err_msg = format!("{:?}", err);
        let _ = err_msg; // TODO: assert error contains "{expected_value}\""""
option_some = '        assert!(result.is_some(), "expected Some for: {condition}");'
option_some_value = """        let inner = result.expect("expected Some for: {condition}");
        // Branch returns Some({expected_value})
        let _ = inner; // TODO: assert value matches "{expected_value}\""""
option_none = '        assert!(result.is_none(), "expected None for: {condition}");'
bool_true = '        assert!(result, "expected true when: {condition}");'
bool_false = '        assert!(!result, "expected false when: {condition}");'
collection_empty = '        assert!(result.is_empty(), "expected empty collection for: {condition}");'
collection_non_empty = '        assert!(!result.is_empty(), "expected non-empty collection for: {condition}");'

# ===========================================================================
# Test templates — Rust source code templates for test plan rendering.
#
# Variables:
#   {test_name}      — generated test function name
#   {fn_name}        — function under test
#   {param_setup}    — `let` bindings for each parameter (condition-aware)
#   {param_args}     — comma-separated call arguments (condition-aware)
#   {param_names}    — comma-separated parameter names (raw)
#   {assertion_code} — behavioral assertion derived from branch return + condition
#   {return_shape}   — result, option, bool, unit, collection, etc.
#   {extra_imports}  — use statements needed by parameter defaults
#   {variant}        — return variant: ok, err, some, none, true, false
#   {expected_value} — description of branch return value
#   {ok_type}, {err_type}, {some_type} — generic type parameters
#   {condition}      — human-readable branch condition
#   {is_method}      — true if function has a receiver
#   {is_pure}        — true if function has no side effects
# ===========================================================================

[contract.test_templates]

# Result<T,E> — Ok branch (uses behavioral assertion)
result_ok = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
{assertion_code}
    }
"""

# Result<T,E> — Err branch (uses behavioral assertion)
result_err = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
{assertion_code}
    }
"""

# Option<T> — Some branch (uses behavioral assertion)
option_some = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
{assertion_code}
    }
"""

# Option<T> — None branch (uses behavioral assertion)
option_none = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
{assertion_code}
    }
"""

# bool — true branch (uses behavioral assertion)
bool_true = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
{assertion_code}
    }
"""

# bool — false branch (uses behavioral assertion)
bool_false = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
{assertion_code}
    }
"""

# Unit return — just verify it doesn't panic
unit = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
        assert!(result.is_ok(), "expected Ok for: {condition}");
    }
"""

# Result<T,E> — Err branch
result_err = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
        assert!(result.is_err(), "expected Err for: {condition}");
    }
"""

# Option<T> — Some branch
option_some = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
        assert!(result.is_some(), "expected Some for: {condition}");
    }
"""

# Option<T> — None branch
option_none = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
        assert!(result.is_none(), "expected None for: {condition}");
    }
"""

# bool — true branch
bool_true = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
        assert!(result, "expected true for: {condition}");
    }
"""

# bool — false branch
bool_false = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
        assert!(!result, "expected false for: {condition}");
    }
"""

# Unit return — just verify it doesn't panic
unit = """
    #[test]
    fn {test_name}() {
{param_setup}
        {fn_name}({param_args});
    }
"""

# No branches detected — basic no-panic test
no_panic = """
    #[test]
    fn {test_name}() {
{param_setup}
        let _ = {fn_name}({param_args});
    }
"""

# Effect verification — documents expected side effects
effects = """
    #[test]
    fn {test_name}() {
        // Expected effects: {effects}
{param_setup}
        let _ = {fn_name}({param_args});
    }
"""

# Collection return — verify non-empty or specific length
collection = """
    #[test]
    fn {test_name}() {
{param_setup}
        let result = {fn_name}({param_args});
        assert!(!result.is_empty(), "expected non-empty collection for: {condition}");
    }
"""

# Generic value return — fallback
default = """
    #[test]
    fn {test_name}() {
{param_setup}
        let _result = {fn_name}({param_args});
    }
"""
