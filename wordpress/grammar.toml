# PHP Language Grammar for Homeboy (WordPress Extension)
#
# Defines structural patterns for PHP source files.
# Used by: audit, scaffold, drift, transform, refactor
#
# This grammar is loaded by utils/grammar.rs and consumed by all features
# that need to understand PHP source structure.

[language]
id = "php"
extensions = ["php"]

[comments]
line = ["//", "#"]
block = [["/*", "*/"]]
doc = ["/**"]

[strings]
quotes = ['"', "'"]
escape = "\\"
multiline = []

[blocks]
open = '{'
close = '}'

# ===========================================================================
# Patterns — each key is a concept name used by features
# ===========================================================================

[patterns.namespace]
# Matches: namespace DataMachine\Abilities;
regex = '^namespace\s+([\w\\\\]+)\s*;'
context = "top_level"
skip_comments = true
skip_strings = true

[patterns.namespace.captures]
name = 1

[patterns.class]
# Matches: class Foo, abstract class Bar, final class Baz
# Also: interface Qux, trait Quux
regex = '^(?:abstract\s+)?(?:final\s+)?(class|trait|interface)\s+(\w+)(?:\s+extends\s+([\w\\\\]+))?'
context = "top_level"
skip_comments = true
skip_strings = true

[patterns.class.captures]
kind = 1
name = 2
extends = 3

[patterns.method]
# Matches: public function foo(), protected static function bar($x)
# Also: function standalone_function()
regex = '((?:(?:public|protected|private|static|abstract|final)\s+)*)function\s+(\w+)\s*\(([^)]*)\)'
context = "any"
skip_comments = true
skip_strings = true

[patterns.method.captures]
modifiers = 1
name = 2
params = 3

[patterns.import]
# Matches: use App\Models\User; use App\Models\User as UserModel;
regex = '^use\s+([\w\\\\]+)(?:\s+as\s+\w+)?\s*;'
context = "top_level"
skip_comments = true
skip_strings = true

[patterns.import.captures]
path = 1

[patterns.trait_use]
# Matches: use SomeTrait; (inside class body — in_block context)
regex = '^\s+use\s+([\w\\\\]+)\s*[;{]'
context = "in_block"
skip_comments = true
skip_strings = true

[patterns.trait_use.captures]
name = 1

[patterns.property]
# Matches: public string $name; protected ?int $count = 0;
regex = '(public|protected|private)\s+(?:static\s+)?(?:readonly\s+)?(?:([\w\\\\|?]+)\s+)?\$(\w+)'
context = "in_block"
skip_comments = true
skip_strings = true

[patterns.property.captures]
visibility = 1
type_hint = 2
name = 3

[patterns.implements]
# Matches: class Foo implements Bar, Baz
regex = '(?:class|interface)\s+\w+(?:\s+extends\s+[\w\\\\]+)?\s+implements\s+([\w\\\\,\s]+?)(?:\s*\{)'
context = "top_level"
skip_comments = true
skip_strings = true

[patterns.implements.captures]
interfaces = 1

[patterns.const]
# Matches: const FOO = 'bar'; public const BAZ = 1;
regex = '(?:public|protected|private)?\s*const\s+(\w+)\s*='
context = "any"
skip_comments = true
skip_strings = true

[patterns.const.captures]
name = 1

# --- WordPress-specific patterns ---

[patterns.register_post_type]
regex = "register_post_type\\s*\\(\\s*['\"]([\\w-]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.register_post_type.captures]
name = 1

[patterns.register_taxonomy]
regex = "register_taxonomy\\s*\\(\\s*['\"]([\\w-]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.register_taxonomy.captures]
name = 1

[patterns.register_rest_route]
regex = "register_rest_route\\s*\\([^,]+,\\s*['\"]([^'\"]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.register_rest_route.captures]
name = 1

[patterns.add_action]
regex = "add_action\\s*\\(\\s*['\"]([\\w-]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.add_action.captures]
name = 1

[patterns.add_filter]
regex = "add_filter\\s*\\(\\s*['\"]([\\w-]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.add_filter.captures]
name = 1

[patterns.do_action]
regex = "do_action(?:_ref_array)?\\s*\\(\\s*['\"]([^'\"]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.do_action.captures]
name = 1

[patterns.apply_filters]
regex = "apply_filters(?:_ref_array)?\\s*\\(\\s*['\"]([^'\"]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.apply_filters.captures]
name = 1

[patterns.wp_cli_command]
regex = "WP_CLI::add_command\\s*\\(\\s*['\"]([^'\"]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.wp_cli_command.captures]
name = 1

[patterns.wp_register_ability]
regex = "wp_register_ability\\s*\\(\\s*['\"]([^'\"]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.wp_register_ability.captures]
name = 1

[patterns.register_block_type]
regex = "register_block_type\\s*\\(\\s*['\"]([\\w-]+/[\\w-]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.register_block_type.captures]
name = 1

[patterns.add_shortcode]
regex = "add_shortcode\\s*\\(\\s*['\"]([\\w-]+)['\"]"
context = "any"
skip_comments = true
skip_strings = false

[patterns.add_shortcode.captures]
name = 1

# ===========================================================================
# Contract — function body analysis for test generation & effect detection
# ===========================================================================

[contract]
# PHP return type separator: function foo(): ReturnType
return_type_separator = ":"
# PHP parameter format: Type $name (or just $name for untyped)
param_format = "type_dollar_name"

# Fallback default expression when no type_default or type_constructor matches.
fallback_default = 'null'

# Class property extraction — enables field-level assertions in generated tests.
# Matches PHP property declarations like:
#   public string $name;
#   protected ?int $count = 0;
#   private array $items = [];
# PHP has type before name: capture group 1 = type, group 2 = name
# field_name_group / field_type_group tell core which group is which
field_pattern = '^\s*(?:public|protected|private)\s+(?:readonly\s+)?(\??\w+)\s+\$(\w+)'
field_name_group = 2
field_type_group = 1
field_visibility_pattern = '^\s*public\b'
field_assertion_template = "{indent}$this->assertSame( {expected_value}, $result->{field_name} );"

# Side effect detection patterns
[contract.effects]
file_read = [
  'file_get_contents\s*\(',
  'fopen\s*\(',
  'fread\s*\(',
  'file\s*\(',
  'readfile\s*\(',
  'wp_filesystem',
  'get_option\s*\(',
  'get_transient\s*\(',
  'get_post_meta\s*\(',
  'get_user_meta\s*\(',
]
file_write = [
  'file_put_contents\s*\(',
  'fwrite\s*\(',
  'fclose\s*\(',
  'update_option\s*\(',
  'set_transient\s*\(',
  'update_post_meta\s*\(',
  'update_user_meta\s*\(',
  'wp_insert_post\s*\(',
  'wp_update_post\s*\(',
  '\$wpdb->insert\s*\(',
  '\$wpdb->update\s*\(',
  '\$wpdb->replace\s*\(',
]
file_delete = [
  'unlink\s*\(',
  'rmdir\s*\(',
  'delete_option\s*\(',
  'delete_transient\s*\(',
  'delete_post_meta\s*\(',
  'wp_delete_post\s*\(',
  '\$wpdb->delete\s*\(',
]
process_spawn = [
  'exec\s*\(',
  'shell_exec\s*\(',
  'system\s*\(',
  'passthru\s*\(',
  'proc_open\s*\(',
  'WP_CLI::runcommand\s*\(',
]
mutation = [
  '->save\s*\(',
  '->store\s*\(',
  '->persist\s*\(',
  '\[\]\s*=',
  'array_push\s*\(',
  'array_splice\s*\(',
  'unset\s*\(',
]
network = [
  'wp_remote_get\s*\(',
  'wp_remote_post\s*\(',
  'wp_remote_request\s*\(',
  'wp_safe_remote_get\s*\(',
  'wp_safe_remote_post\s*\(',
  'curl_exec\s*\(',
  'curl_init\s*\(',
  '\$http->',
]
logging = [
  'error_log\s*\(',
  'wp_die\s*\(',
  'trigger_error\s*\(',
  'WP_CLI::log\s*\(',
  'WP_CLI::success\s*\(',
  'WP_CLI::warning\s*\(',
  'WP_CLI::error\s*\(',
]

# Guard clause patterns
guard_patterns = [
  'if\s*\(.*\)\s*\{\s*return\s+',
  'if\s*\(\s*empty\s*\(',
  'if\s*\(\s*!\s*\$',
  'if\s*\(\s*is_wp_error\s*\(',
  'if\s*\(\s*!\s*is_',
  'if\s*\(\s*null\s*===',
  'if\s*\(\s*\$\w+\s*===\s*null',
]

# Return variant patterns
[contract.return_patterns]
ok = ['return\s+new\s+WP_REST_Response\b']
err = ['return\s+new\s+WP_Error\b', 'throw\s+new\s+\\\\?Exception', 'throw\s+new\s+\\\\?\w+Exception']
some = ['return\s+\$\w+\s*;']
none = ['\breturn\s+null\s*;']
true = ['\breturn\s+true\s*;']
false = ['\breturn\s+false\s*;']

# Error propagation patterns
error_propagation = [
  'throw\s+',
  'wp_die\s*\(',
]

# Return type shape detection (matched against the return type after ":")
[contract.return_shapes]
bool = ['^\s*bool\s*$']
collection = ['^\s*array\s*$', '^\s*iterable\s*$', 'Collection']
option = ['^\s*\?', '^\s*null\|', '\|null\s*$']
result = ['WP_Error\s*\|', '\|\s*WP_Error', 'WP_REST_Response']

# Panic path patterns
panic_patterns = [
  'wp_die\s*\(',
  'exit\s*[\(;]',
  'die\s*\(',
  'throw\s+new\s+',
  'trigger_error\s*\(.+E_USER_ERROR',
]

# ===========================================================================
# Type defaults — zero/default value expressions for PHP test input construction
# ===========================================================================

[[contract.type_defaults]]
pattern = '^string$'
value = "''"
imports = []

[[contract.type_defaults]]
pattern = '^\?string$'
value = 'null'
imports = []

[[contract.type_defaults]]
pattern = '^int$'
value = '0'
imports = []

[[contract.type_defaults]]
pattern = '^\?int$'
value = 'null'
imports = []

[[contract.type_defaults]]
pattern = '^float$'
value = '0.0'
imports = []

[[contract.type_defaults]]
pattern = '^bool$'
value = 'false'
imports = []

[[contract.type_defaults]]
pattern = '^array$'
value = '[]'
imports = []

[[contract.type_defaults]]
pattern = '^\?array$'
value = 'null'
imports = []

[[contract.type_defaults]]
pattern = '^void$'
value = ''
imports = []

[[contract.type_defaults]]
pattern = '^callable$'
value = "function() {}"
imports = []

[[contract.type_defaults]]
pattern = '^\\\\?Closure$'
value = "function() {}"
imports = []

[[contract.type_defaults]]
pattern = '^mixed$'
value = 'null'
imports = []

[[contract.type_defaults]]
pattern = '^\?object$'
value = 'null'
imports = []

[[contract.type_defaults]]
pattern = '^object$'
value = 'new \\stdClass()'
imports = []

[[contract.type_defaults]]
pattern = '^\\\\?WP_REST_Request$'
value = "new \\WP_REST_Request()"
imports = []

[[contract.type_defaults]]
pattern = '^\\\\?WP_Post$'
value = "get_post( self::factory()->post->create() )"
imports = []

[[contract.type_defaults]]
pattern = '^\\\\?WP_User$'
value = "get_userdata( self::factory()->user->create() )"
imports = []

[[contract.type_defaults]]
pattern = '^\?'
value = 'null'
imports = []

# ===========================================================================
# Type constructors — behavioral value expressions for condition-driven setup.
# Core produces semantic hints (e.g., "empty", "nonexistent_path"); this section
# maps (hint, type_pattern) → PHP-specific code expression.
# ===========================================================================

# ── empty: produce a value where empty($x) == true ──
[[contract.type_constructors]]
hint = 'empty'
pattern = '^array$|^\?array$'
value = '[]'
imports = []

[[contract.type_constructors]]
hint = 'empty'
pattern = '^string$|^\?string$'
value = "''"
imports = []

# ── non_empty: produce a value where !empty($x) ──
[[contract.type_constructors]]
hint = 'non_empty'
pattern = '^array$|^\?array$'
value = "[ 'test_value' ]"
imports = []

[[contract.type_constructors]]
hint = 'non_empty'
pattern = '^string$|^\?string$'
value = "'test_{param_name}'"
imports = []

# ── none / some_default: nullable variants ──
[[contract.type_constructors]]
hint = 'none'
pattern = '^\?'
value = 'null'
imports = []

[[contract.type_constructors]]
hint = 'some_default'
pattern = '^\?string$'
value = "'test_value'"
imports = []

[[contract.type_constructors]]
hint = 'some_default'
pattern = '^\?int$'
value = '1'
imports = []

[[contract.type_constructors]]
hint = 'some_default'
pattern = '^\?array$'
value = "[ 'test' ]"
imports = []

[[contract.type_constructors]]
hint = 'some_default'
pattern = '^\?'
value = 'new \stdClass()'
imports = []

# ── path existence ──
[[contract.type_constructors]]
hint = 'nonexistent_path'
pattern = '^string$|^\?string$'
value = "'/tmp/nonexistent_test_path'"
imports = []

[[contract.type_constructors]]
hint = 'existent_path'
pattern = '^string$|^\?string$'
value = "sys_get_temp_dir() . '/homeboy_test_' . uniqid()"
imports = []

# ── boolean values ──
[[contract.type_constructors]]
hint = 'true'
pattern = '^bool$'
value = 'true'
imports = []

[[contract.type_constructors]]
hint = 'false'
pattern = '^bool$'
value = 'false'
imports = []

# ── numeric values ──
[[contract.type_constructors]]
hint = 'zero'
pattern = '^int$|^\?int$|^float$|^\?float$'
value = '0'
imports = []

[[contract.type_constructors]]
hint = 'positive'
pattern = '^int$|^\?int$|^float$|^\?float$'
value = '1'
imports = []

# ── string content ──
[[contract.type_constructors]]
hint = 'contains'
pattern = '^string$|^\?string$'
value = "'{hint_arg}'"
imports = []

# ===========================================================================
# Assertion templates — PHPUnit-specific assertion code for behavioral tests.
# Variables: {condition}, {expected_value}, {variant}
# ===========================================================================

[contract.assertion_templates]
result_ok = "        $this->assertNotWPError( $result, 'Expected success for: {condition}' );"
result_ok_value = """        $this->assertNotWPError( $result, 'Expected success for: {condition}' );
        // Branch returns success ({expected_value}) when: {condition}"""
result_err = "        $this->assertWPError( $result, 'Expected WP_Error for: {condition}' );"
result_err_value = """        $this->assertWPError( $result, 'Expected WP_Error for: {condition}' );
        // Branch returns error ({expected_value}) when: {condition}
        $this->assertSame( '{expected_value}', $result->get_error_code() );"""
option_some = "        $this->assertNotNull( $result, 'Expected non-null for: {condition}' );"
option_some_value = """        $this->assertNotNull( $result, 'Expected non-null for: {condition}' );
        // Branch returns ({expected_value}) when: {condition}"""
option_none = "        $this->assertNull( $result, 'Expected null for: {condition}' );"
bool_true = "        $this->assertTrue( $result, 'Expected true when: {condition}' );"
bool_false = "        $this->assertFalse( $result, 'Expected false when: {condition}' );"
collection_empty = "        $this->assertIsArray( $result );\n        $this->assertEmpty( $result, 'Expected empty array for: {condition}' );"
collection_non_empty = "        $this->assertIsArray( $result );\n        $this->assertNotEmpty( $result, 'Expected non-empty array for: {condition}' );"

# ===========================================================================
# Test templates — PHPUnit source code templates for test plan rendering
#
# Variables:
#   {test_name}      — generated test method name
#   {fn_name}        — method under test
#   {param_setup}    — variable assignments (condition-aware)
#   {param_args}     — comma-separated call arguments (condition-aware)
#   {assertion_code} — behavioral assertion from assertion_templates
#   {return_shape}, {variant}, {expected_value}, {condition}, {is_method}
# ===========================================================================

[contract.test_templates]

# Return true branch (uses behavioral assertion)
bool_true = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
{assertion_code}
    }
"""

# Return false branch (uses behavioral assertion)
bool_false = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
{assertion_code}
    }
"""

# Nullable — Some/non-null branch (uses behavioral assertion)
option_some = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
{assertion_code}
    }
"""

# Nullable — null branch (uses behavioral assertion)
option_none = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
{assertion_code}
    }
"""

# WP_Error / exception — success branch (uses behavioral assertion)
result_ok = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
{assertion_code}
    }
"""

# WP_Error / exception — error branch (uses behavioral assertion)
result_err = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
{assertion_code}
    }
"""

# Unit/void return — just verify no exception
unit = """
    public function {test_name}() {
{param_setup}
        $this->instance->{fn_name}({param_args});
        $this->addToAssertionCount(1);
    }
"""

# No branches detected — basic invocation test
no_panic = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
        $this->assertNotNull( $result );
    }
"""

# Effect verification
effects = """
    public function {test_name}() {
        // Expected effects: {effects}
{param_setup}
        $this->instance->{fn_name}({param_args});
        $this->addToAssertionCount(1);
    }
"""

# Collection return (uses behavioral assertion)
collection = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
{assertion_code}
    }
"""

# Generic value return — fallback
default = """
    public function {test_name}() {
{param_setup}
        $result = $this->instance->{fn_name}({param_args});
        $this->assertNotNull( $result );
    }
"""
